<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>맛집 지도 v4 · 네이버맵</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=v3x4sdbnyg&submodules=geocoder"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

/* ═══════════════════════════════════
   THEME VARIABLES
═══════════════════════════════════ */
:root {
  --accent:   #ff6b35;
  --accent2:  #ffd166;
  --accent3:  #06d6a0;
  --blue:     #4f8ef7;
  --purple:   #a78bfa;
  --danger:   #ef4444;
}

[data-theme="dark"] {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #21262d;
  --surface3:   #2d333b;
  --border:     #30363d;
  --text:       #e6edf3;
  --text-sub:   #c9d1d9;
  --text-muted: #6e7681;
  --map-bg:     #1a1f2b;
  --road:       #2a2e42;
  --road-main:  #373c55;
  --shadow:     0 8px 32px rgba(0,0,0,0.5);
}

[data-theme="light"] {
  --bg:         #f0f2f5;
  --surface:    #ffffff;
  --surface2:   #f6f8fa;
  --surface3:   #eaeef2;
  --border:     #d0d7de;
  --text:       #1f2328;
  --text-sub:   #363b42;
  --text-muted: #636c76;
  --map-bg:     #e8ecf0;
  --road:       #d1d5db;
  --road-main:  #b8bfc7;
  --shadow:     0 4px 16px rgba(0,0,0,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
}

/* (이하 기존 스타일 및 스크립트 로직 유지) */
/* ... 중략 ... */
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">URBAN<span>CNS</span> 맛집</div>
    <div class="header-chip">NAVER MAP V3</div>
    <div class="header-spacer"></div>
    <button class="rank-btn">실시간 랭킹</button>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </header>
  
  <div class="main">
    <div class="map-area">
      <div id="map" class="map-canvas"></div>
      <div id="mapLoading" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:var(--map-bg); z-index:100; color:var(--text-muted); font-size:14px;">
        지도를 불러오는 중...
      </div>
    </div>
    
    <div class="side-panel" id="sidePanel">
      <div class="panel-empty" id="emptyState">
        <div class="panel-empty-icon">📍</div>
        <p>지도의 마커를 클릭하여<br>상세 정보를 확인하세요.</p>
      </div>
      </div>
  </div>
</div>

<script>
/* 실제 구동을 위해 필요한 JavaScript 로직 (기존 파일의 내용을 그대로 포함해야 합니다)
   RESTAURANTS 데이터 및 initMap 함수 등 
*/

// (중략된 스크립트 부분은 기존 파일의 하단 로직을 그대로 사용하세요)
// 지도를 불러오지 못했을 때의 에러 처리 로직 등이 포함되어 있습니다.

function initMap() {
  const mapOptions = {
    center: new naver.maps.LatLng(37.3595704, 127.105399),
    zoom: 15
  };
  window._naverMap = new naver.maps.Map('map', mapOptions);
  
  const loadingEl = document.getElementById('mapLoading');
  if (loadingEl) loadingEl.style.display = 'none';
}

window.addEventListener('load', function () {
  if (typeof naver === 'undefined' || !naver.maps) {
    document.getElementById('mapLoading').innerHTML = '지도를 불러오지 못했습니다. Client ID 및 도메인 설정을 확인하세요.';
  } else {
    initMap();
  }
});
</script>
</body>
</html>
